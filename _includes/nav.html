<!-- Navigation -->
{% if page.nav-style == "invert" or page.header-style == "text" %}
<nav class="navbar navbar-default navbar-custom navbar-fixed-top invert">
    {% else %}
    <nav class="navbar navbar-default navbar-custom navbar-fixed-top">
        {% endif %}
        <div class="container-fluid">
            <!-- Brand and toggle get grouped for better mobile display -->
            <div class="navbar-header page-scroll">
                <button type="button" class="navbar-toggle">
                    <span class="sr-only">切换导航</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
            </div>

            <!-- Collect the nav links, forms, and other content for toggling -->
            <div id="site_navbar">
                <div class="navbar-collapse">
                    <ul class="nav navbar-nav navbar-right">
                        <li{% if page.url == '/' %} class="active"{% endif %}>
                            <a href="{{ site.baseurl }}/">首页</a>
                        </li>
                        {% assign current_url = page.url %}
                        {% for nav_page in site.pages %}
                        {% if nav_page.title and nav_page.hide-in-nav != true %}
                        <li{% if nav_page.url == current_url %} class="active"{% endif %}>
                            <a href="{{ nav_page.url | prepend: site.baseurl }}">{{ nav_page.title }}</a>
                        </li>
                        {% endif %}
                        {% endfor %}
                        <li class="theme-toggle-item">
                            <button class="theme-toggle" type="button" aria-label="切换夜间模式" aria-pressed="false">
                                <i class="fa fa-moon-o theme-toggle-icon" aria-hidden="true"></i>
                                <span class="theme-toggle-text">夜间</span>
                            </button>
                        </li>
                        <li class="search-icon">
                            <a href="#search" aria-label="搜索文章">
                                <i class="fa fa-search"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            <!-- /.navbar-collapse -->
        </div>
        <!-- /.container -->
    </nav>

    <script>
        // Drop Bootstarp low-performance Navbar
        // Use customize navbar with high-quality material design animation
        // in high-perf jank-free CSS3 implementation
        var $body = document.body;
        var $toggle = document.querySelector('.navbar-toggle');
        var $navbar = document.querySelector('#site_navbar');
        var $collapse = document.querySelector('.navbar-collapse');

        var siteNav = {
            close: function () {
                $navbar.className = " ";
                // wait until animation end.
                setTimeout(function () {
                    // prevent frequently toggle
                    if ($navbar.className.indexOf('in') < 0) {
                        $collapse.style.height = "0px"
                    }
                }, 400)
            },
            open: function () {
                $collapse.style.height = "auto"
                $navbar.className += " in";
            }
        }

        // Bind Event
        $toggle.addEventListener('click', function (e) {
            if ($navbar.className.indexOf('in') > 0) {
                siteNav.close()
            } else {
                siteNav.open()
            }
        })

        /**
         * Since Fastclick is used to delegate 'touchstart' globally
         * to hack 300ms delay in iOS by performing a fake 'click',
         * Using 'e.stopPropagation' to stop 'touchstart' event from 
         * $toggle/$collapse will break global delegation.
         * 
         * Instead, we use a 'e.target' filter to prevent handler
         * added to document close the navigation.
         *
         * Also, we use 'click' instead of 'touchstart' as compromise
         */
        document.addEventListener('click', function (e) {
            if (e.target == $toggle) return;
            if (e.target.className == 'icon-bar') return;
            siteNav.close();
        })
    </script>
